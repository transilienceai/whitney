reasoning: |
  FULLY_REAL adversarial pair to pi_t2_006. The LLM4Shell equivalent
  of the p2sql_lv5 defense. Structurally near-identical to pi_t2_n04
  (same input/output judge pattern, same secure_tag hardening), but
  the downstream chain is run_pal_chain_native instead of
  create_db_chain.

  This fixture matters because it tests whether the scanner can
  correctly recognize the SAME defense shape applied to a DIFFERENT
  vulnerable baseline. A scanner that memorized "LLM-as-Judge protects
  SQL chain" from pi_t2_n04 but fails on "LLM-as-Judge protects PAL
  chain" here is overfitting to specific sink types. The defense is
  the same; only the chain being defended is different.

  Defense analysis: same as pi_t2_n04. Recognized LLM-as-Judge pattern
  with correct structural properties (ordering, rejection, input
  coverage, secure_tag hardening).

  CAVEAT specific to LLM4Shell: catching LLM4Shell attacks via LLM-as-
  Judge is HARDER than catching P2SQL attacks because:
    - SQL attack payloads have detectable syntactic markers (UNION,
      DROP, INSERT, etc.) that a judge can look for.
    - Code-execution attack payloads can be disguised as legitimate
      code questions ("what does os.system('x') do?") and the judge
      needs to reason about intent, not syntax.
  In practice, LLM4Shell defenses layer multiple controls (sandboxed
  execution, AST validation, resource limits) on top of the judge.
  A judge-only defense is a necessary-but-not-sufficient control.

  For Phase A purposes, under the binary defense model, LLM-as-Judge
  with correct structural properties counts as a recognized defense
  and flips the verdict to TN. Phase E will revisit this with a
  layered-defense analysis that considers sandbox presence.

  Verdict: negative. Recognized defense, TN.

  The two fully_real pairs from the same repo (pi_t2_n04 P2SQL + judge,
  pi_t2_n05 LLM4Shell + judge) test that the scanner generalizes the
  defense recognition across sink types. Combined with pi_t2_n02
  (NeMo Guardrails) and pi_t2_n03 (DeepKeep), the corpus now has
  FOUR fully_real TNs covering three different recognized defense
  families (NeMo, DeepKeep, LLM-as-Judge) all from the same source
  repo — strong Tier 2 density.
