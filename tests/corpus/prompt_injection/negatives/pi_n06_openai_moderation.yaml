reasoning: |
  Canonical OpenAI Moderation vendor TN. Closes the "OpenAI Moderation"
  parity gap surfaced by test_recognized_vendors_have_tn_fixtures.

  Defense analysis:
    - RECOGNIZED: OpenAI Moderation is on the recognized-guardrail list.
      The classifier covers OpenAI's published policy categories (hate,
      self-harm, sexual, violence, and the harassment/illegal subcats).
    - ORDERING: pre-call. moderations.create runs BEFORE
      chat.completions.create. The HTTP 400 path skips the LLM
      invocation entirely.
    - REJECTION: HTTP 400 with explicit error body — not just logged.
    - INPUT COVERAGE: the full user_text is passed verbatim to
      moderations.create(input=user_text). Stage 3 LLM triage must
      verify same-variable flow.

  IMPORTANT NUANCE: OpenAI Moderation is a policy classifier, not a
  prompt-injection-specific classifier. It blocks overt jailbreaks
  containing violent role-play, illegal-content prompts, etc., but a
  sophisticated prompt injection that stays within policy categories
  can pass through. Whitney's defense ladder records Moderation as
  recognised at a lower tier than dedicated PI guardrails (Bedrock
  Guardrails with PROMPT_ATTACK filter, Azure Prompt Shields, Lakera).
  Per the binary defense model in tests/corpus/README.md:88-128,
  recognized=true is sufficient for TN regardless of tier — apps using
  Moderation alone are at the bottom of the defense ladder, not
  undefended.

