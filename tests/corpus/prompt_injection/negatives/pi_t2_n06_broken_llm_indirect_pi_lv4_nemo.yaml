reasoning: |
  FULLY_REAL adversarial pair to pi_t2_004. Both halves of this pair
  are verbatim from the same upstream source file (llm_agent.py in
  13o-bbr-bbq/Broken_LLM_Integration_App), authored by the repo
  maintainer as an explicit graduated-difficulty CTF. Same pattern as
  pi_t2_003 ↔ pi_t2_n02; this completes the indirect_pi pair as
  pi_t2_004 ↔ pi_t2_n06.

  Defense analysis:
    - RECOGNIZED: NeMo Guardrails is on the recognized-guardrail list.
      load_nemo_guardrails() returns a RunnableRails that wraps the
      LLM call with configured input and output rails from a YAML
      config (`rails.yaml`). This is the canonical NeMo integration
      pattern for LangChain.
    - COMPOSITION: the pipe operator chain
        prompt_template | (guardrails | model)
      means every (page_content, question) → prompt_template →
      guardrails → model. The rails ALWAYS run before the model.
    - KEY POINT FOR INDIRECT INJECTION: unlike pi_t2_n02 (where the
      only attacker input was `question`), the input to the chain
      here ALSO includes `page_content` — the WebBaseLoader-fetched
      bytes from an attacker-controlled URL. The rails see the full
      composed prompt (template + page_content + question), so the
      indirect-injection payload smuggled in page_content is
      classifiable by the input rails. This is exactly the failure
      mode the rails are designed to catch.
    - REJECTION: NeMo Guardrails' default behavior on policy violation
      is to short-circuit the chain and return a refusal message
      rather than invoking the model.

  The DEFERRED concern (same as pi_t2_n02): the actual rails.yaml
  config is not shown in this fixture. A NeMo config with no input
  rails defined would be a "pretend defense" that passes Phase A
  recognition but fails real-world effectiveness. Phase E extends
  to inspect rails.yaml content. For Phase A, "the composition
  pattern is present and the indirect-injection input flows through
  it" is sufficient for TN.

  Verdict: negative. One recognized defense, binary rule fires TN.

