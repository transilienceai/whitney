reasoning: |
  Second fully_real adversarial pair to pi_t2_003 (the first being
  pi_t2_n02 which uses NeMo Guardrails). This one uses DeepKeep, a
  commercial AI firewall with input and output filtering. Same
  underlying vulnerable baseline — two different recognized defenses.

  DeepKeep is on the recognized-guardrail list as a "dedicated guardrail
  API" (Tier A in the old ladder, now simply "recognized: true" under
  the binary model).

  Defense analysis:
    - ORDERING: dk_request_filter runs BEFORE llm_chain.run(question).
      Confirmed in code. Stage 3 LLM triage must verify.
    - REJECTION: if request_res["violate_policy"], the function returns
      immediately with the firewall's content — the main chain never
      runs. Confirmed rejection, not log-only.
    - INPUT COVERAGE: the full `question` is passed to the firewall
      via `prompt=question`. Confirmed full coverage.
    - OUTPUT DEFENSE BONUS: there's also dk_response_filter after the
      main chain, catching attacks that smuggle through input but
      manifest in output. This is above and beyond the minimum
      TN requirement — DeepKeep provides both directions.

  Verdict: negative. One recognized defense, binary rule fires TN.
  (Actually TWO defenses — input and output — both recognized — making
  this a particularly strong TN.)

  Trim notes: the original function in llm_agent.py is ~80 lines
  because it also records inspect metadata to a JSON log file on disk
  (timestamps, request ID, elapsed times, triggered flags). That's
  operational logging, not security-relevant to the prompt injection
  defense. Fixture trims the inspect-log machinery while preserving
  the defense branching verbatim. Source URL has the full original.
  License MIT preserved.

  Why we want TWO different guardrails defending the same baseline:
  it tests whether the scanner's defense-recognition engine is broad
  enough to catch multiple vendor APIs, not just the one that appeared
  in its training corpus. pi_t2_n02 (NeMo) teaches "recognize
  load_nemo_guardrails + runnable composition." pi_t2_n03 (DeepKeep)
  teaches "recognize dk_request_filter + branching rejection." Both
  are TN for the same underlying code, demonstrating defense-shape
  diversity.

  This fixture also tests the scanner's recognition of NEWER vendor
  APIs. DeepKeep is less well-known than Lakera/Bedrock/NeMo, and a
  scanner that only recognizes the top-3 guardrails will flag this
  as a TP (missed defense). Whitney needs to recognize the full
  recognized-guardrail list from README, including DeepKeep.
